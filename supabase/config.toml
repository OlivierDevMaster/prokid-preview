# Supabase Configuration File
# Documentation: https://supabase.com/docs/guides/cli/local-development#config-toml

[project]
# Project ID (optional, used for linking to remote project)
# id = "your-project-id"

[auth]
enabled = true

[api]
enabled = true

[db]
# Port for the local database
# port = 54322

[studio]
enabled = true

[inbucket]
enabled = true

[storage]
enabled = true

[realtime]
enabled = false

[functions.test]
enabled = true
verify_jwt = true
import_map = "./functions/test/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/test/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/test/*.html" ]

[functions.report]
enabled = true
verify_jwt = true
import_map = "./functions/report/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/report/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/report/*.html" ]
